<!DOCTYPE html>
<html>
    <head>
        <title>VIGILANT</title>
        <link rel="stylesheet" href="./static/style.css">
        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <script type="module" src="./script/navigation.js"></script>
        <script type="text/javascript" src="./script/components.js"></script>
    </head>
    <body onload="getTheme(); populateNavigationBar('Analysis')">
        <div id="navigation-bar">
            <a href="./index.html" id="home-link">VIGILANT</a>
            <a class="spacer"></a>
            <div id="change-theme" onclick="toggleTheme()">Change Theme</div>
        </div>
        <div>
            <div>
                <button hidden type="button"  id="reset-button">Upload another file<span class="material-icons">replay</span></button>
            </div>
            
            <file-upload id="file-upload" accept=".csv, application/vnd.ms-excel" accept-display=".csv"></file-upload>
            <div class="error" id="fileInputError" hidden></div>
            
            
            <div id="data-cleaning">
                <div id="data-cleaning-options">
                    <span>
                        <label>Dataset</label>
                        
                        <select name="datasetKey" required="true" default="dataset">
                            <option hidden value="" class="default">Select a column</option>
                        </select>
                        <span class="validation-errors"></span>
                    </span>
                    <span>
                        <label>Model</label>
                        <select name="modelKey" required="true" default="model">
                            <option hidden value="" class="default">Select a column</option>
                        </select>
                        <span class="validation-errors"></span>
                    </span>
                    <span>
                        <label>Performance</label>
                        <select name="performanceKey" required="true" default="AUROC">
                            <option hidden value="" class="default">Select a column</option>
                        </select>
                        <span class="validation-errors"></span>
                    </span>
                    <span>
                        <label>Repetition</label>
                        <select name="repetitionKey" default="repetition">
                            <option hidden value="" class="default">Select a column</option>
                            <option value="" class="default">None</option>
                        </select>
                        <span class="validation-errors"></span>
                    </span>
                    <button type="button" id="submit-data-cleaning" class="primary">Submit</button>
                </div>
                <div id="overall-validation-errors"></div>
                <details id="input-data-preview" open="">
                    <summary>Input data</summary>
                </details>
            </div>
            <div id="results-display">
                <div id="plot-target"></div>
                <div id="table-wrapper">
                    <details id="raw-data">
                        <summary>Data</summary>
                    </details>
                    <details id="results-data" open="">
                        <summary>
                            <span>VIGILANT Measurements</span>
                            <a type='button' class="material-icons tertiary" download="VIGILANT-results.csv">download</a>
                        </summary>
                        <details id="results-data-long">
                            <summary>
                                <span>By Repetition</span>
                                <a type='button' class="material-icons tertiary" download="VIGILANT-results-by-repetition.csv">download</a>
                            </summary>
                        </details>
                    </details>
                </div>
                
            </div>
        </div> 


    </body>
</html>
