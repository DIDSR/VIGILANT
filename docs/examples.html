<!DOCTYPE html>
<html>
    <script type="text/javascript">
        // set the theme before the page loads at all (avoid flickering)
        const theme = localStorage.getItem('theme') ?? (window.matchMedia("(prefers-color-scheme: dark)") ? 'dark' : 'light');
        document.documentElement.setAttribute('theme', theme);
    </script>
    <head>
        <title>VIGILANT</title>
        <link rel="stylesheet" href="./static/style.css">
        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <script type="module" src="./script/navigation.js"></script>
        <script type="text/javascript" src="./script/components.js"></script>
    </head>
    <body onload="getTheme();populateNavigationBar('Examples')">
        <div id="navigation-bar">
            <a href="./index.html" id="home-link">VIGILANT</a>
            <a class="spacer"></a>
            <div id="change-theme" onclick="toggleTheme()">Change Theme</div>
        </div>
        <div>
            <tabbed-selection id="example-display" collapsible></tabbed-selection>
            <div id="results-display">
                <div id="plot-target"></div>
                <div id="table-wrapper">
                    <details id="raw-data">
                        <summary>Data</summary>
                    </details>
                    <details id="results-data" open="">
                        <summary>
                            <span>VIGILANT Measurements</span>
                            <a type='button' class="material-icons tertiary" download="VIGILANT-results.csv">download</a>
                        </summary>
                        <details id="results-data-long">
                            <summary>
                                <span>By Repetition</span>
                                <a type='button' class="material-icons tertiary" download="VIGILANT-results-by-repetition.csv">download</a>
                            </summary>
                        </details>
                    </details>
                </div>
            </div>
        </div>       
    </body>
    <script type="module">
        
    </script>
</html>
