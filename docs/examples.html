<!DOCTYPE html>
<html>
    <head>
        <title>VIGILANT</title>
        <link rel="stylesheet" href="./static/style.css">
        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <script type="module" src="./script/navigation.js"></script>
    </head>
    <body onload="window.populateNavigationBar('Examples')">
        <div id="navigation-bar"></div>
        <div>
            <div id="example-display" class="sidebar">
                <button type="button" class="sidebar-toggle material-icons borderless" onclick="this.parentElement.toggleAttribute('collapsed')">chevron_left</button>
            </div>
            <div>
                <div id="example-description"><span></span></div>
                <div id="results-display">
                    <div id="plot-target"></div>
                    <div id="table-wrapper">
                        <details id="raw-data">
                            <summary>Data</summary>
                        </details>
                        <details id="results-data" open="">
                            <summary>
                                <span>VIGILANT Measurements</span>
                                <a type='button' class="material-icons tertiary" download="VIGILANT-results.csv">download</a>
                            </summary>
                            <details id="results-data-long">
                                <summary>
                                    <span>By Repetition</span>
                                    <a type='button' class="material-icons tertiary" download="VIGILANT-results-by-repetition.csv">download</a>
                                </summary>
                            </details>
                        </details>
                    </div>
            </div>
        </div>
        
    </body>
    <script type="module">
        
    </script>
</html>
